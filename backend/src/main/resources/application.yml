spring:
  application:
    name: scopeflow-api

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/scopeflow}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    connection-timeout: 10000

  cache:
    type: caffeine
    caffeine:
      # userStatus cache: TTL 5min, max 10.000 entries (1 per active user)
      # Invalidation via TTL — on role/status change, token refresh forces new lookup after expiry
      spec: maximumSize=10000,expireAfterWrite=300s

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  security:
    user:
      name: admin
      password: admin123

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.scopeflow: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/scopeflow.log
    max-size: 10MB
    max-history: 10

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-32-characters-long}
  expiration: 900000 # 15 minutes in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# AI Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4-turbo
  temperature: 0.7
  max-tokens: 1000

# AWS Configuration
aws:
  s3:
    bucket: ${S3_BUCKET:scopeflow-mvp}
    region: ${AWS_REGION:us-east-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
