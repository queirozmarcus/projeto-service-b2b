# Example Kubernetes Secret - DO NOT COMMIT WITH REAL VALUES
# Create this secret manually before deploying:
#
# kubectl create secret generic scopeflow-briefing-secrets \
#   --from-literal=database-url=jdbc:postgresql://postgres-host:5432/scopeflow \
#   --from-literal=database-username=scopeflow \
#   --from-literal=database-password=<strong-password> \
#   --from-literal=jwt-secret=<random-32-chars-min> \
#   --from-literal=rabbitmq-host=rabbitmq-host \
#   --from-literal=rabbitmq-username=scopeflow \
#   --from-literal=rabbitmq-password=<strong-password> \
#   --from-literal=redis-host=redis-host \
#   --from-literal=aws-access-key-id=<aws-access-key> \
#   --from-literal=aws-secret-access-key=<aws-secret-key> \
#   --from-literal=aws-s3-bucket=scopeflow-production \
#   --from-literal=openai-api-key=<openai-key> \
#   --namespace production
#
# For staging:
# kubectl create secret generic scopeflow-briefing-secrets \
#   ... (same keys) \
#   --namespace staging

