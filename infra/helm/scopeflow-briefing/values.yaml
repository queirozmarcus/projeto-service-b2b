# Default values for scopeflow-briefing
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Replica configuration
replicaCount: 3

# Image configuration
image:
  repository: ghcr.io/scopeflow/scopeflow-api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"

# Pod labels
podLabels:
  app.kubernetes.io/name: scopeflow-briefing
  app.kubernetes.io/component: api

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.scopeflow.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scopeflow-api-tls
      hosts:
        - api.scopeflow.com

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Startup probe configuration (Java 21 + Spring Boot may take time)
startupProbe:
  httpGet:
    path: /actuator/health/startup
    port: 8080
  initialDelaySeconds: 0
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30
  successThreshold: 1

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # Alternative: maxUnavailable: 1

# Volume mounts (for temporary files, logs, etc.)
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: logs
    mountPath: /app/logs

volumes:
  - name: tmp
    emptyDir: {}
  - name: logs
    emptyDir: {}

# Node selector for pod placement
nodeSelector: {}

# Tolerations for pod scheduling
tolerations: []

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - scopeflow-briefing
          topologyKey: kubernetes.io/hostname

# Environment variables
env:
  # Spring Profile
  - name: SPRING_PROFILES_ACTIVE
    value: "production"

  # Server Configuration
  - name: SERVER_PORT
    value: "8080"

  # Database Configuration (from secrets)
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: database-url

  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: database-username

  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: database-password

  # JWT Configuration (from secrets)
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: jwt-secret

  - name: JWT_EXPIRATION_MS
    value: "900000"

  # RabbitMQ Configuration (from secrets)
  - name: SPRING_RABBITMQ_HOST
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: rabbitmq-host

  - name: SPRING_RABBITMQ_PORT
    value: "5672"

  - name: SPRING_RABBITMQ_USERNAME
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: rabbitmq-username

  - name: SPRING_RABBITMQ_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: rabbitmq-password

  # Redis Configuration (from secrets)
  - name: SPRING_DATA_REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: redis-host

  - name: SPRING_DATA_REDIS_PORT
    value: "6379"

  # AWS S3 Configuration (from secrets)
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: aws-access-key-id

  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: aws-secret-access-key

  - name: AWS_S3_BUCKET
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: aws-s3-bucket

  - name: AWS_REGION
    value: "us-east-1"

  # OpenAI Configuration (from secrets)
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: scopeflow-briefing-secrets
        key: openai-api-key

  # JVM Options (Java 21 + Virtual Threads)
  - name: JAVA_OPTS
    value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Additional configuration from ConfigMap
configMap:
  create: true
  data:
    application.yaml: |
      spring:
        application:
          name: scopeflow-briefing
        jpa:
          open-in-view: false
          properties:
            hibernate:
              default_schema: public
        flyway:
          enabled: true
          baseline-on-migrate: true
      management:
        endpoints:
          web:
            exposure:
              include: health,info,prometheus,metrics
        endpoint:
          health:
            probes:
              enabled: true
            show-details: when-authorized
        metrics:
          tags:
            application: scopeflow-briefing
            environment: production
      logging:
        level:
          com.scopeflow: INFO
          org.springframework.web: WARN
          org.hibernate: WARN
