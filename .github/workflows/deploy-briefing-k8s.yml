name: Deploy Briefing Domain (Kubernetes)

on:
  push:
    branches:
      - feature/sprint-1b-briefing-domain
      - main
    paths:
      - 'backend/**'
      - 'infra/helm/**'
      - '.github/workflows/deploy-briefing-k8s.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infra/helm/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/scopeflow-api

jobs:
  # Stage 1: Build & Test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: backend
        run: ./mvnw test

      - name: Run integration tests
        working-directory: backend
        run: ./mvnw verify -DskipUnitTests

      - name: Generate JaCoCo coverage report
        working-directory: backend
        run: ./mvnw jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: java,briefing
          name: briefing-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

  # Stage 2: Build Docker Image
  build-docker:
    name: Build Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # Stage 3: Lint Helm Chart
  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Lint Helm chart
        run: |
          helm lint infra/helm/scopeflow-briefing
          helm lint infra/helm/scopeflow-briefing -f infra/helm/scopeflow-briefing/values-staging.yaml
          helm lint infra/helm/scopeflow-briefing -f infra/helm/scopeflow-briefing/values-production.yaml

      - name: Template Helm chart (dry-run)
        run: |
          helm template scopeflow-briefing infra/helm/scopeflow-briefing \
            --set image.tag=${{ github.sha }} \
            --debug

  # Stage 4: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    needs: [build-docker, lint-helm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature/sprint-1b-briefing-domain' || github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://api-staging.scopeflow.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install scopeflow-briefing ./infra/helm/scopeflow-briefing \
            --namespace staging \
            --create-namespace \
            --values ./infra/helm/scopeflow-briefing/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m \
            --atomic

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/scopeflow-briefing -n staging --timeout=5m

      - name: Run smoke tests
        run: |
          sleep 10
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never -n staging -- \
            curl -s http://scopeflow-briefing:8080/actuator/health | grep '"status":"UP"'

      - name: Deployment summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://api-staging.scopeflow.com" >> $GITHUB_STEP_SUMMARY

  # Stage 5: Manual Approval & Deploy to Production
  deploy-production:
    name: Deploy to Production
    needs: [build-docker, lint-helm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.scopeflow.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to production via Helm
        run: |
          helm upgrade --install scopeflow-briefing ./infra/helm/scopeflow-briefing \
            --namespace production \
            --create-namespace \
            --values ./infra/helm/scopeflow-briefing/values-production.yaml \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/scopeflow-briefing -n production --timeout=10m

      - name: Run health checks
        run: |
          for i in {1..10}; do
            echo "Health check attempt $i..."
            kubectl run curl-test-$i --image=curlimages/curl:latest --rm -i --restart=Never -n production -- \
              curl -s http://scopeflow-briefing:8080/actuator/health | grep '"status":"UP"' && break
            sleep 5
          done

      - name: Deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://api.scopeflow.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Replicas:** 3 (HPA enabled: 3-10)" >> $GITHUB_STEP_SUMMARY

  # Stage 6: Notify
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Briefing Domain deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Briefing Domain Deployment Successful*\n*Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Environments:* Staging + Production"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Briefing Domain deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Briefing Domain Deployment Failed*\n*Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Check logs:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
