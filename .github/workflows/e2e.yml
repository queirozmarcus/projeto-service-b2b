name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Backend API que o frontend consome — apontando para o backend local do CI
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      # URL base do Next.js para o Playwright
      PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
      # Credenciais do usuário de teste (seed no banco de staging/test)
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_TEST_FULL_NAME: ${{ secrets.E2E_TEST_FULL_NAME }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scopeflow_test
          POSTGRES_USER: scopeflow
          POSTGRES_PASSWORD: scopeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Backend — Spring Boot
      # -----------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend (skip tests — apenas CI de E2E)
        working-directory: backend
        run: ./mvnw -q -DskipTests clean package

      - name: Run backend migrations
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/scopeflow_test
          SPRING_DATASOURCE_USERNAME: scopeflow
          SPRING_DATASOURCE_PASSWORD: scopeflow
        run: ./mvnw -q flyway:migrate

      - name: Start backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/scopeflow_test
          SPRING_DATASOURCE_USERNAME: scopeflow
          SPRING_DATASOURCE_PASSWORD: scopeflow
          JWT_SECRET: ci-test-secret-not-used-in-prod-32chars
          SPRING_PROFILES_ACTIVE: test
        run: |
          java -jar target/*.jar &
          echo "Backend PID: $!"
          # Aguarda até 60s até o actuator/health responder UP
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health | grep -q '"UP"'; then
              echo "Backend pronto."
              break
            fi
            echo "Aguardando backend... ($i/30)"
            sleep 2
          done

      # -----------------------------------------------------------------------
      # Frontend — Next.js
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Start Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: |
          npm run start &
          echo "Frontend PID: $!"
          # Aguarda até 60s até o Next.js responder
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend pronto."
              break
            fi
            echo "Aguardando frontend... ($i/30)"
            sleep 2
          done

      # -----------------------------------------------------------------------
      # Playwright
      # -----------------------------------------------------------------------
      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 3
