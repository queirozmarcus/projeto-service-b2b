version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scopeflow-postgres-staging
    environment:
      POSTGRES_DB: scopeflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scopeflow-staging

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: scopeflow-rabbitmq-staging
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data_staging:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scopeflow-staging

  redis:
    image: redis:7-alpine
    container_name: scopeflow-redis-staging
    ports:
      - "6379:6379"
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scopeflow-staging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: scopeflow-api-staging
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scopeflow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8080
      JWT_SECRET: staging-secret-key-change-in-production-min-32-chars
      JWT_EXPIRATION_MS: 900000
      AWS_S3_ENABLED: "false"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local-dev-key
      AWS_SECRET_ACCESS_KEY: local-dev-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGIN_LOCAL: "http://localhost:3000"
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - scopeflow-staging
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    container_name: scopeflow-frontend-staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - scopeflow-staging
    restart: unless-stopped

volumes:
  postgres_data_staging:
  rabbitmq_data_staging:
  redis_data_staging:

networks:
  scopeflow-staging:
    driver: bridge
